label: Earth Armor
flavor: You imbue your armor with the immovable sturdiness of earth.
description: >-
  **Type** Armor

  **Parts** The monster must have the earth trait or an ability or spell with
  the earth trait.

  - - -

  **Effect** You imbue your armor with the immovable sturdiness of earth.

  - **6th** Your armor makes you as stalwart as a rock. The
  armor's item bonus to saving throws increases by 1 (minimum
  +1 if the armor didn't have an item bonus to
  saving throws, maximum +4 if the armor had a +3
  item bonus to saving throws) against any effect that attempts
  to Reposition, Shove, or Trip you or otherwise attempt to
  force you to move or knock you prone.

  - **8th** Whenever an effect would move you 10 feet or more,
  your armor reduces the movement by 5 feet.

  - **10th** Whenever an effect would move you 20 feet or more,
  your armor reduces the movement by 10 feet, instead of
  5 feet.

  - **12th** The armor's item bonus to saving throws increases by a
  total of 2, instead of 1, against effects that attempt
  to force you to move or knock you prone, to
  a maximum of +5.

  - **14th** Your armor makes you as obstructive as a boulder. When
  you wish to do so, you provide standard cover instead
  of lesser cover.

  - **16th** It's harder to move around the rocky protrusions of your
  armor. The increased item bonus to saves from this imbued
  property also applies to your Reflex DC when determining the
  DC for a creature to Tumble Through your space, and
  your space is still treated as greater difficult terrain even
  on a success.

  - **18th** Your armor reduces all forced movement of 10 feet or
  more by half (this replaces the 8th and 10th level
  reductions to forced movement).

  - **20th** When you would be forced to move and are standing
  on the ground, you can negate the forced movement by
  melding your body into the earth and taking damage as
  your body breaks instead of moving. As a free action,
  you can choose to lose Hit Points equal to four
  times the distance the forced movement would have moved you
  (after reducing the forced movement by half from the 18th
  level benefit). If you do, you don't move.
