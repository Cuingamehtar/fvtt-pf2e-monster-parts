flavor: You imbue the weapon with creeping darkness.
magic:
  label: Darkness (Magic)
  description: >-
    **Type** Weapon
 
    **Parts** The monster must have the darkness or shadow trait or an ability or spell with the darkness or shadow trait.
 
    - - -
 
    **Effect** You imbue the weapon with creeping darkness.
 
    **Path** Magic; Choose when you first imbue the weapon for the granted 
    spells to be either arcane or divine.
 
    - **2nd** The weapon gains a two-action concentrate and manipulate activation allowing it 
    to attempt to counteract the light cantrip (but not other light effects) 
    with a counteract rank equal to half the item’s level rounded up.
 
    - **4th** The weapon can cast _eye-biting shadow_ once per day.
 
    - **6th** The weapon can cast _darkness_ once per day.
 
    - **8th** The weapon can cast _chilling darkness_ once per day.
 
    - **10th** Strikes with the weapon deal 1 additional cold damage as the 
    darkness saps warmth; this additional damage has the darkness trait.
 
    - **12th** The weapon’s _chilling darkness_, _darkness_, and _eye-biting shadow_ heighten to 4th rank.
 
    - **14th** The additional cold damage increases to 1d4.
 
    - **16th** The weapon’s _chilling darkness_, _darkness_, and _eye-biting shadow_ heighten to 6th rank.
 
    - **18th** The cold damage increases to 1d6.
 
    - **20th** The weapon can cast 9th-rank _eclipse burst_ once per day.
  header:
    level-2-counteract: The weapon can attempt to counteract the light cantrip. (Counteract rank equal to half the item's level rounded up)
    level-4-spells: The weapon can cast @UUID[Compendium.battlezoo-bestiary-es-pf2e.spells.Item.5OgFM3D89UdFpKjb]{Eye-Biting Shadow} once per day.
    level-6-spells: >-
     The weapon can cast @UUID[Compendium.battlezoo-bestiary-es-pf2e.spells.Item.5OgFM3D89UdFpKjb]{Eye-Biting Shadow} 
     and @UUID[Compendium.pf2e.spells-srd.Item.4GE2ZdODgIQtg51c]{Darkness} once per day each.
    level-8-spells: >-
     The weapon can cast @UUID[Compendium.battlezoo-bestiary-es-pf2e.spells.Item.5OgFM3D89UdFpKjb]{Eye-Biting Shadow}, @UUID[Compendium.pf2e.spells-srd.Item.4GE2ZdODgIQtg51c]{Darkness}, 
     and @UUID[Compendium.pf2e.spells-srd.Item.sRfSBHWHdbIa0aGc]{Chilling Darkness} once per day each.
    level-12-spells: >-
     The weapon can cast 4th rank @UUID[Compendium.battlezoo-bestiary-es-pf2e.spells.Item.5OgFM3D89UdFpKjb]{Eye-Biting Shadow}, 
     @UUID[Compendium.pf2e.spells-srd.Item.4GE2ZdODgIQtg51c]{Darkness}, and @UUID[Compendium.pf2e.spells-srd.Item.sRfSBHWHdbIa0aGc]{Chilling Darkness} once per day each.
    level-16-spells: >- 
     The weapon can cast 6th rank @UUID[Compendium.battlezoo-bestiary-es-pf2e.spells.Item.5OgFM3D89UdFpKjb]{Eye-Biting Shadow}, 
     @UUID[Compendium.pf2e.spells-srd.Item.4GE2ZdODgIQtg51c]{Darkness}, and @UUID[Compendium.pf2e.spells-srd.Item.sRfSBHWHdbIa0aGc]{Chilling Darkness} once per day each.
    level-20-eclipse-burst: The weapon can cast 9th-rank @UUID[Compendium.pf2e.spells-srd.Item.0jadeyQIItIuRgeH]{Eclipse Burst} once per day.
might:
  label: Darkness (Might)
  description: >-
    **Type** Weapon
 
    **Parts** The monster must have the darkness or shadow trait or an ability or spell with the darkness or shadow trait.
 
    - - -
 
    **Effect** You imbue the weapon with creeping darkness.
 
    **Path** Might
 
    - **4th** Strikes with the weapon deal 1 additional cold damage as the darkness saps warmth; this additional damage has the darkness trait.
 
    - **6th** The additional cold damage increases to 1d4.
 
    - **8th** The additional cold damage increases to 1d6. On a critical hit, darkness shrouds the target’s vision, causing everything around it to be concealed to it unless it has darkvision.
 
    - **12th** The additional cold damage dealt by this imbued property ignores resistances.
 
    - **14th** On a critical hit with the weapon, the target must attempt a Fortitude save against the weapon’s DC. On a failure, it’s blinded for 1 round by magical darkness unless it has greater darkvision; even on a success or critical success, everything around it is concealed to it unless it has greater darkvision.
 
    - **18th** The additional cold damage increases to 1d8.
 
    - **20th** On a successful Strike with the weapon, before applying the additional cold damage, the target gains weakness 1 to darkness until the beginning of your next turn.
  effects:
    level-12-resistance: The additional cold damage dealt by this imbued property ignores resistances.
    level-8-concealed: On a critical hit, everything is concealed to the target unless it has darkvision.
    level-14-blinded: On a critical hit, the target must succed on a @Check[fortitude|dc:resolve(14 +@item.level +floor(@item.level /3)
      +max(@item.level -21,0) -max(@item.level -23, 0))] save or be @UUID[Compendium.pf2e.conditionitems.Item.XgEqL1kFApUbl5Z2]{Blinded} for 1 round.
    level-20-weakness: >- 
     On a successful Strike with the weapon, before applying the additional cold damage, 
     the target gains weakness 1 to darkness until the beginning of your next turn.
     @UUID[Compendium.pf2e-monster-parts.activations-and-effects.Item.ezzdeD7d0ra6b3TX]{Effect:
      Might Path Damage Weakness}
  header:
    level-12-resistance: The additional cold damage ignores resistances.
    level-8-concealed: >- 
     On a critical hit, the target's vision is shrouded in darkness. 
     Everything is concealed to the target unless they have darkvision.
    level-14-blinded: >- 
     On a critical hit, the target must succeed at a Fortitude save or be blinded for 1 round. 
     Even on a success or critical success, everything is concealed to the target unless they have darkvision.
    level-20-weakness: On a successful Strike with the weapon, before applying force damage, the
      target gains weakness 1 to cold damage until the beginning of your next turn.
tech:
  label: Darkness (Technique)
  description: >-
    **Type** Weapon
 
    **Parts** The monster must have the darkness or shadow trait or an ability or spell with the darkness or shadow trait.
 
    - - -
 
    **Effect** You imbue the weapon with creeping darkness.
 
    **Path** Technique
 
    - **4th** Strikes with the weapon deal 1 persistent cold damage as encroaching darkness slowly drains their warmth away; 
    this additional damage has the darkness trait.
 
    - **6th** Strikes with the weapon deal 1 additional cold damage as the darkness saps warmth; 
    this additional damage has the darkness trait.
 
    - **8th** The persistent cold damage on a hit increases to 1d6. On a critical hit, darkness shrouds the target’s vision, 
    causing everything around it to be concealed to it unless it has darkvision.
 
    - **12th** The additional damage and persistent cold damage dealt by this imbued property ignores resistances.
 
    - **14th** The persistent cold damage on a hit increases to 1d8.
 
    - **16th** While suffering from the persistent cold damage, the shrouding darkness interferes with the target’s vision. 
    Everything around it is concealed to it unless it has darkvision. 
    On a critical hit with a weapon, the target must attempt a Fortitude save against the weapon’s DC. 
    On a failure, it’s blinded for 1 round by magical darkness unless it has greater darkvision; 
    even on a success or critical success, everything around it is concealed to it unless it has greater darkvision.
 
    - **18th** The persistent cold damage on a hit increases to 1d10.
 
    - **20th** The persistent darkness devours the light. Each time the target takes the persistent cold damage from this property, 
    the darkness attempts to counteract one light effect on the target or the target’s belongings with a counteract rank of 10 and a counteract modifier of +33.
 
  effects:
    level-12-resistance: The cold damage dealt by this imbued property ignores resistances.
    level-16-concealed: >- 
     While taking persistent damage from this imbue property, everything is concealed to the target unless they have greater darkvision.
     The target must succeed on a @Check[fortitude|dc:resolve(14 +@item.level +floor(@item.level /3) +max(@item.level -21,0) -max(@item.level -23, 0))] save or be blinded for 1 round.
     Even on a success or critical success, everything is concealed to it unless it has greater darkvision.
    level-20-counteract: >- 
     Whenever the target takes persistent cold damge, 
     the darkness attempts to counteract one light effect on the target or the targets belongings. (Counteract rank 10, +33 counteract modifier)
  header:
    level-8-concealed: On a critical hit, the target's vision is shrouded in darkness. Everything is concealed to the target unless it has darkvision.
    level-12-resistance: The cold damage dealt by this imbued property ignores resistances.
    level-16-blinded: >- 
     While taking persistent damage from this imbue property, everything is concealed to the target unless they have greater darkvision.
     The target must succeed on a Fortitude save or be blinded for 1 round. 
     On a success, or critical success everything is still concealed to the target unless it has greater darkvision.
    level-20-counteract: >- 
     Whenever the target takes persistent cold damage, 
     the darkness attempts to counteract a light effect on the target or the targets belongings. (Counteract rank 10, +33 counteract modifier)