tech:
  label: Life (Technique)
  description: >-
    **Type** Weapon


    *Parts* The monster must have the vitality trait or an ability or spell that
    deals vitality damage.

    - - -

    *Effect* You imbue the weapon with the cleansing power of life energy in
    order to damage undead. As normal, vitality damage only harms undead and
    other creatures with void healing, such as dhampirs.

    - - -

    *Path* Technique

    - **2nd** Strikes with the weapon deal 1 persistent vitality damage.

    - **4th** Strikes with the weapon deal 1 additional vitality damage.

    - **6th** The persistent vitality damage increases to 1d6. On a critical
    hit, the undead is also
    @UUID[Compendium.pf2e.conditionitems.Item.MIRkyAjyBeXivMa7]{Enfeebled 1}
    until the end of your next turn.

    - **10th** The vitality damage dealt by this imbued property (including
    persistent vitality damage) ignores resistances.

    - **12th** The persistent vitality damage on a hit increases to 1d8.

    - **14th** On a critical hit, the undead is enfeebled 2 until the end of
    your next turn. It must also attempt a Fortitude save. On a failure, it’s
    enfeebled 3 until the end of your next turn instead of enfeebled 2, and on a
    critical failure, it’s destroyed. This effect has the incapacitation trait.

    - **18th** The persistent vitality damage on a hit increases to 1d10.

    - **20th** Creatures suffering persistent vitality damage from this imbued
    property have difficulty healing from negative energy due to the coruscating
    vitality energy surging through them. If a negative effect would cause the
    creature to recover Hit Points, it must first succeed at a counteract effect
    against the imbued property’s level of 20 and DC of 43. Even on a successful
    counteract check, the Hit Points recovered are reduced by 1d10. On a
    critical success, the creature recovers the full amount.
