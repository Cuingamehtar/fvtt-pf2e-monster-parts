      until then, on a failure, it's
      @UUID[Compendium.pf2e.conditionitems.Item.MIRkyAjyBeXivMa7]{Enfeebled 3}
      until then, and on a critical failure, it's destroyed. This effect has the
      incapacitation trait.
    level-20-weakness: >-
      On a successful Strike with the weapon, before applying vitality damage,
      the target gains weakness 1 to vitality until the beginning of your next
      turn.
