flavor: >-
  You imbue the weapon with the cleansing power of life energy in order to
  damage undead. As normal, vitality damage only harms undead and other
  creatures with void healing, such as dhampirs.
magic:
  label: Life (Magic)
  description: >-
    **Type** Weapon


    *Parts* The monster must have the vitality trait or an ability or spell that
    deals vitality damage.

    - - -

    *Effect* You imbue the weapon with the cleansing power of life energy in
    order to damage undead. As normal, vitality damage only harms undead and
    other creatures with void healing, such as dhampirs.

    - - -

    *Path* Magic; Choose when you first imbue the weapon for the granted spells
    to be either divine or primal.

    - **2nd** The weapon can cast
    @UUID[Compendium.pf2e.spells-srd.Item.kcelf6IHl3L9VXXg]{Vitality Lash} as a
    cantrip, heightened to half the item’s level rounded up.

    - **4th** The weapon can cast
    @UUID[Compendium.pf2e.spells-srd.Item.rfZpqmj0AIIdkVIs]{Heal} once per day.

    - **6th** The weapon’s *heal* heightens to 2nd rank.

    - **8th** The weapon can cast 3rd-rank
    @UUID[Compendium.pf2e.spells-srd.Item.2iQKhCQBijhj5Rf3]{Infuse Vitality}
    once per day.

    - **10th** Strikes with the weapon deal 1 additional vitality damage.

    - **12th** The weapon’s heal heightens to 4th rank, and the weapon can cast
    @UUID[Compendium.pf2e.spells-srd.Item.Hnc7eGi7vyZenAIm]{Breath of Life} once
    per day.

    - **14th** The additional vitality damage increases to 1d4.

    - **16th** The weapon can cast
    @UUID[Compendium.pf2e.spells-srd.Item.2Vkd1IxylPceUAAF]{Regenerate} once per
    day. The weapon’s *infuse vitality* and *heal* heighten to 5th rank.

    - **18th** The additional vitality damage increases to 1d6.

    - **20th** The weapon’s *heal* and *regenerate* heighten to 8th rank.
  header:
    level-4-spells: >-
      The weapon can cast
      @UUID[Compendium.pf2e.spells-srd.Item.rfZpqmj0AIIdkVIs]{Heal} once per
      day.
    level-6-spells: >-
      The weapon can cast 2nd rank
      @UUID[Compendium.pf2e.spells-srd.Item.rfZpqmj0AIIdkVIs]{Heal} once per
      day.
    level-8-spells: >-
      The weapon can cast 2nd rank
      @UUID[Compendium.pf2e.spells-srd.Item.rfZpqmj0AIIdkVIs]{Heal} and 3rd rank
      @UUID[Compendium.pf2e.spells-srd.Item.2iQKhCQBijhj5Rf3]{Infuse Vitality}
      once per day each.
    level-12-spells: >-
      The weapon can cast 4th rank
      @UUID[Compendium.pf2e.spells-srd.Item.rfZpqmj0AIIdkVIs]{Heal}, 3rd rank
      @UUID[Compendium.pf2e.spells-srd.Item.2iQKhCQBijhj5Rf3]{Infuse Vitality}
      and @UUID[Compendium.pf2e.spells-srd.Item.Hnc7eGi7vyZenAIm]{Breath of
      Life} once per day each.
    level-16-spells: >-
      The weapon can cast 5th rank
      @UUID[Compendium.pf2e.spells-srd.Item.rfZpqmj0AIIdkVIs]{Heal}, 5th rank
      @UUID[Compendium.pf2e.spells-srd.Item.2iQKhCQBijhj5Rf3]{Infuse Vitality},
      @UUID[Compendium.pf2e.spells-srd.Item.Hnc7eGi7vyZenAIm]{Breath of Life}
      and @UUID[Compendium.pf2e.spells-srd.Item.2Vkd1IxylPceUAAF]{Regenerate}
      once per day each.
    level-20-spells: >-
      The weapon can cast 8th rank
      @UUID[Compendium.pf2e.spells-srd.Item.rfZpqmj0AIIdkVIs]{Heal}, 5th rank
      @UUID[Compendium.pf2e.spells-srd.Item.2iQKhCQBijhj5Rf3]{Infuse Vitality},
      @UUID[Compendium.pf2e.spells-srd.Item.Hnc7eGi7vyZenAIm]{Breath of Life}
      and 8th rank
      @UUID[Compendium.pf2e.spells-srd.Item.2Vkd1IxylPceUAAF]{Regenerate} once
      per day each.
might:
  label: Life (Might)
  description: >-
    **Type** Weapon


    *Parts* The monster must have the vitality trait or an ability or spell that
    deals vitality damage.

    - - -

    *Effect* You imbue the weapon with the cleansing power of life energy in
    order to damage undead. As normal, vitality damage only harms undead and
    other creatures with void healing, such as dhampirs.

    - - -

    *Path* Might

    - **2nd** Strikes with the weapon deal 1 additional vitality damage.

    - **4th** The additional vitality damage increases to 1d4.

    - **6th** The additional vitality damage increases to 1d6. On a critical
    hit, the undead is also
    @UUID[Compendium.pf2e.conditionitems.Item.MIRkyAjyBeXivMa7]{Enfeebled 1}
    until the end of your next turn.

    - **10th** The vitality damage dealt by this imbued property ignores
    resistances.

    - **14th** On a critical hit, instead of being enfeebled 1 until the end of
    your next turn, the undead must attempt a Fortitude save. On a critical
    success, it’s enfeebled 1 until the end of your next turn, on a success,
    it’s enfeebled 2 until then, on a failure, it’s enfeebled 3 until then, and
    on a critical failure, it’s destroyed. This effect has the incapacitation
    trait.

    - **18th** The additional vitality damage increases to 1d8.

    - **20th** On a successful Strike with the weapon, before applying vitality
    damage, the target gains weakness 1 to vitality until the beginning of your
    next turn.
  effects:
