might:
  label: Air (Might)
  description: >-
    **Type** Weapon


    **Parts** The monster must have the air trait or an ability or spell with
    the air trait.

    - - -

    **Effect** You imbue the weapon with slicing blades of wind.


    **Path** Might

    - **4th** Strikes with the weapon deal 1 additional slashing damage from
    blades of wind; this additional damage has the air trait.

    - **6th** The additional slashing damage increases to 1d4.

    - **8th** The additional slashing damage increases to 1d6. On a critical
    hit, you can push the target up to 5 feet away from you.

    - **12th** The additional slashing damage dealt by this imbued property
    ignores resistances. Even if the main weapon deals slashing damage, this
    benefit only applies to the additional damage.

    - **14th** On a critical hit with the weapon, you can push the target up to
    10 feet away from you.

    - **18th** The additional slashing damage increases to 1d8.

    - **20th** On a successful Strike with the weapon, before applying the
    additional slashing damage, the target gains weakness 1 to air until the
    beginning of your next turn.
