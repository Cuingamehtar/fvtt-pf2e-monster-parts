magic:
  label: Air (Magic)
  description: >-
    **Type** Weapon


    **Parts** The monster must have the air trait or an ability or spell with
    the air trait.

    - - -

    **Effect** You imbue the weapon with slicing blades of wind.


    **Path** Magic; Choose when you first imbue the weapon for the granted
    spells to be either arcane or primal.

    - **2nd** The weapon can cast
    @UUID[Compendium.battlezoo-bestiary-es-pf2e.spells.Item.oWtpcZ8aq5qQdKri]{Rushing
    Gust} as a cantrip, heightened to half the item’s level rounded up.

    - **4th** The weapon can cast
    @UUID[Compendium.pf2e.spells-srd.Item.g8QqHpv2CWDwmIm1]{Gust of Wind} once
    per day.

    - **6th** Strikes with the weapon deal 1 additional slashing damage from
    blades of wind; this additional damage has the air trait.

    - **8th** The weapon can cast
    @UUID[Compendium.pf2e.spells-srd.Item.it4ZsAi6XgvGcodc]{Wall of Wind} once
    per day.

    - **10th** The weapon can cast
    @UUID[Compendium.pf2e.spells-srd.Item.V8wXOsoejQhe6CyG]{Vapor Form} once per
    day.

    - **12th** The weapon can cast
    @UUID[Compendium.battlezoo-bestiary-es-pf2e.spells.Item.W86Tb9T5YUsIHqPO]{Launching
    Vortex} once per day.

    - **14th** The additional slashing damage increases to 1d4.

    - **16th** The weapon’s *launching vortex* heightens to 6th rank.

    - **18th** The additional slashing damage increases to 1d6.

    - **20th** The weapon can cast 9th-rank
    @UUID[Compendium.pf2e.spells-srd.Item.yLJROsQtyrPIKcDx]{Wrathful Storm} once
    per day, but the only effect you create is a tornado, and the storm can
    create this effect multiple times in a row.
