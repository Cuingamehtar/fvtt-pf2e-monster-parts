tech:
  label: Air (Technique)
  description: >-
    **Type** Weapon


    **Parts** The monster must have the air trait or an ability or spell with
    the air trait.

    - - -

    **Effect** You imbue the weapon with slicing blades of wind.


    **Path** Technique

    - **4th** Strikes with the weapon deal 1 persistent slashing damage as
    blades of wind surround and slash them; this additional damage has the air
    trait.

    - **6th** Strikes with the weapon deal 1 additional slashing damage from
    blades of wind; this additional damage has the air trait.

    - **8th** The persistent slashing damage on a hit increases to 1d6. On a
    critical hit, you can push the target up to 5 feet away from you.

    - **12th** The additional damage and persistent slashing damage dealt by
    this imbued property ignores resistances (as does the damage from hazardous
    terrain caused by this imbued property’s 16th level effect). Even if the
    main weapon deals slashing damage, this benefit only applies to the slashing
    damage from this imbued property.

    - **14th** The persistent slashing damage on a hit increases to 1d8.

    - **16th** While suffering from the persistent slashing damage, the
    surrounding blades of air damage the creature the more it moves, slashing at
    them each time they do. All terrain is hazardous terrain for them, dealing 2
    slashing damage for each square through which they move (this includes the
    movement from being pushed by a critical hit). On a critical hit, you can
    push the target up to 10 feet away.

    - **18th** The persistent slashing damage on a hit increases to 1d10.

    - **20th** On a critical hit, you can push the target up to 20 feet away.
  effects:
    level-8-push: You can push the target 5 feet away from you.
    level-16-push: You can push the target up to 10 feet away from you.
    level-20-push: You can push the target up to 20 feet away from you.
    level-12-resistance: >-
      The additional damage and persistent slashing damage dealt by this imbued
      property ignores resistances (as does the damage from hazardous terrain
      caused by this imbued property’s 16th level effect). Even if the main
      weapon deals slashing damage, this benefit only applies to the slashing
      damage from this imbued property.
    level-16-hazardous: >-
      While suffering from the persistent slashing damage, the surrounding
      blades of air damage the creature the more it moves, slashing at them each
      time they do. All terrain is hazardous terrain for them, dealing 2
      slashing damage for each square through which they move (this includes the
      movement from being pushed by a critical hit).
