flavor: You imbue the handwraps with mastery over the body and its form.
morph-trait: Additional bludgeoning damage from this weapon has the morph trait.
damage-penalty-note: >-
  Each time you fail to remove the persistent damage from the Body imbuement at
  the end of your turn, the status penalty increases by 1, up to a –4 status
  penalty.
magic:
  label: Body (Magic)
  description: >-
    **Type** Weapon (*handwraps of mighty blows* only)


    **Parts** The monster must be Huge or larger, have an ability or spell with
    the morph or polymorph trait, or have effects associated with the body
    element (any creature from this book with the body element listed
    qualifies).

    - - -

    **Effect** You imbue the handwraps with mastery over the body and its form.


    **Path** Magic; Choose when you first imbue the handwraps for the granted
    spells to be either arcane or primal.

    - **2nd** The weapon can cast
    @UUID[Compendium.pf2e.spells-srd.Item.MPxbKoR54gkYkqLO]{Gouging Claw} as a
    cantrip, heightened to half the item’s level rounded up.

    - **4th** The weapon can cast
    @UUID[Compendium.pf2e.spells-srd.Item.aEM2cttJ2eYcLssW]{Fleet Step} once per
    day.

    - **6th** The weapon can cast
    @UUID[Compendium.pf2e.spells-srd.Item.wzctak6BxOW8xvFV]{Enlarge} once per
    day.

    - **8th** The weapon can cast *pummeling shockwave*<sup>ES</sup> once per
    day.

    - **10th** Strikes with your unarmed attacks deal 1 additional bludgeoning
    damage as the handwraps transform your unarmed attack for greater impact and
    weakens the foe’s defenses. This additional damage has the morph trait.

    - **12th** The handwraps' *enlarge* heightens to 4th rank and the handwraps
    can cast @UUID[Compendium.pf2e.spells-srd.Item.8M03UxGXjYyDFAoy]{Weapon
    Storm} once per day, except that it uses one of your unarmed attacks instead
    of a weapon, and it isn't sanctified holy or unholy regardless of your own
    sanctification.

    - **14th** The additional bludgeoning damage increases to 1d4.

    - **16th** The handwraps' *enlarge* heightens to 6th rank, the handwraps'
    *pummeling shockwave* heightens to 5th rank, and the handwraps can cast
    @UUID[Compendium.pf2e.spells-srd.Item.ZLLY6ThJXCCrO0rL]{Wall of Flesh} once
    per day.

    - **18th** The additional bludgeoning damage increases to 1d6.

    - **20th** The handwraps' *pummeling shockwave* and *wall of flesh* heighten
    to 7th rank and the handwraps' *weapon storm* heightens to 9th-rank.
  header:
    level-4-spells: >-
      The weapon can cast
      @UUID[Compendium.pf2e.spells-srd.Item.aEM2cttJ2eYcLssW]{Fleet Step} once
      per day.
    level-6-spells: >-
      The weapon can cast
      @UUID[Compendium.pf2e.spells-srd.Item.aEM2cttJ2eYcLssW]{Fleet Step} and
      @UUID[Compendium.pf2e.spells-srd.Item.wzctak6BxOW8xvFV]{Enlarge} once per
      day each.
    level-8-spells: >-
      The weapon can cast
      @UUID[Compendium.pf2e.spells-srd.Item.aEM2cttJ2eYcLssW]{Fleet Step},
      @UUID[Compendium.pf2e.spells-srd.Item.wzctak6BxOW8xvFV]{Enlarge} and
      *pummeling shockwave*<sup>ES</sup> once per day each.
    level-12-spells: >-
      The weapon can cast
      @UUID[Compendium.pf2e.spells-srd.Item.aEM2cttJ2eYcLssW]{Fleet Step}, 4th
      rank @UUID[Compendium.pf2e.spells-srd.Item.wzctak6BxOW8xvFV]{Enlarge},
      *pummeling shockwave*<sup>ES</sup> and
      @UUID[Compendium.pf2e.spells-srd.Item.8M03UxGXjYyDFAoy]{Weapon Storm} once
      per day each.
    level-12-weapon-storm: >-
      *Weapon storm* cast from this weapon uses one of your unarmed attacks
      instead of a weapon, and it isn't sanctified holy or unholy regardless of
      your own sanctification
    level-16-spells: >-
      The weapon can cast
      @UUID[Compendium.pf2e.spells-srd.Item.aEM2cttJ2eYcLssW]{Fleet Step}, 6th
      rank @UUID[Compendium.pf2e.spells-srd.Item.wzctak6BxOW8xvFV]{Enlarge}, 5th
      rank *pummeling shockwave*<sup>ES</sup>,
      @UUID[Compendium.pf2e.spells-srd.Item.8M03UxGXjYyDFAoy]{Weapon Storm} and
      @UUID[Compendium.pf2e.spells-srd.Item.ZLLY6ThJXCCrO0rL]{Wall of Flesh}
      once per day each.
    level-20-spells: >-
      The weapon can cast
      @UUID[Compendium.pf2e.spells-srd.Item.aEM2cttJ2eYcLssW]{Fleet Step}, 6th
      rank @UUID[Compendium.pf2e.spells-srd.Item.wzctak6BxOW8xvFV]{Enlarge}, 7th
      rank *pummeling shockwave*<sup>ES</sup>, 9th rank
      @UUID[Compendium.pf2e.spells-srd.Item.8M03UxGXjYyDFAoy]{Weapon Storm} and
      7th rank @UUID[Compendium.pf2e.spells-srd.Item.ZLLY6ThJXCCrO0rL]{Wall of
      Flesh} once per day each.
might:
  label: Body (Might)
  description: >-
    **Type** Weapon (*handwraps of mighty blows* only)


    **Parts** The monster must be Huge or larger, have an ability or spell with
    the morph or polymorph trait, or have effects associated with the body
    element (any creature from this book with the body element listed
    qualifies).

    - - -

    **Effect** You imbue the handwraps with mastery over the body and its form.


    **Path** Might

    - **4th** Strikes with your unarmed attacks deal 1 additional bludgeoning
    damage as the handwraps transform your unarmed attack for greater impact and
    weakens the foe’s defenses. This additional damage has the morph trait.

    - **6th** The additional bludgeoning damage increases to 1d4.

    - **8th** The additional bludgeoning damage increases to 1d6. On a critical
    hit with an unarmed attack, you strike and expand a weak point in the foe’s
    defenses and reduce their Hardness or resistance to physical damage (either
    all physical damage or bludgeoning, slashing, or piercing damage) by 5 for 1
    round. As usual for multiple instances of the same effect, this reduction
    isn't cumulative with multiple critical hits or multiple body imbued
    properties.

    - **12th** The additional bludgeoning damage dealt by this imbued property
    ignores resistances. Even if the main unarmed attack deals bludgeoning
    damage, this benefit only applies to the additional damage.

    - **14th** On a critical hit with an unarmed attack, your reduction to
    Hardness and physical resistance increases from 5 to 10.

    - **18th** The additional bludgeoning damage increases to 1d8.

    - **20th** On a successful Strike with an unarmed attack, before applying
    the additional bludgeoning damage, the target gains weakness 1 to morph
    effects until the beginning of your next turn.
  effects:
    level-12-resistance: >-
      The additional bludgeoning damage dealt by this imbued property ignores
      resistances. Even if the main unarmed attack deals bludgeoning damage,
      this benefit only applies to the additional damage.
    level-8-weak-point: >-
      On a critical hit with an unarmed attack, you reduce the enemy's Hardness
      or resistance to physical damage (either all physical damage or
      bludgeoning, slashing, or piercing damage) by 5 for 1 round.
    level-14-weak-point: >-
      On a critical hit with an unarmed attack, you reduce the enemy's Hardness
      or resistance to physical damage (either all physical damage or
      bludgeoning, slashing, or piercing damage) by 10 for 1 round.
    level-20-weakness: >-
      On a successful Strike with an unarmed attack, before applying the
      additional bludgeoning damage, the target gains weakness 1 to morph
      effects until the beginning of your next turn.
      @UUID[Compendium.pf2e-monster-parts.activations-and-effects.Item.ezzdeD7d0ra6b3TX]{Effect:
      Might Path Damage Weakness}
