tech:
  label: Body (Technique)
  description: >-
    **Type** Weapon (*handwraps of mighty blows* only)


    **Parts** The monster must be Huge or larger, have an ability or spell with
    the morph or polymorph trait, or have effects associated with the body
    element (any creature from this book with the body element listed
    qualifies).

    - - -

    **Effect** You imbue the handwraps with mastery over the body and its form.


    **Path** Technique

    - **4th** Strikes with an unarmed attack deal 1 persistent bludgeoning
    damage from roiling internal adjustments; this additional damage has the
    morph trait.

    - **6th** Strikes with an unarmed attack deal 1 additional bludgeoning
    damage as the handwraps transform you for greater impact and weakens the
    foe’s defenses. This additional damage has the morph trait.

    - **8th** The persistent bludgeoning damage on a hit increases to 1d6. On a
    critical hit with an unarmed attack, you strike and expand a weak point in
    the foe’s defenses and reduce their Hardness or resistance to physical
    damage (either all physical damage or bludgeoning, slashing, or piercing
    damage) by 5 for 1 round. As usual for multiple instances of the same
    effect, this reduction isn’t cumulative with multiple critical hits or
    multiple body imbued properties.

    - **12th** The additional damage and persistent bludgeoning damage dealt by
    this imbued property ignores resistances. Even if the main unarmed attack
    deals bludgeoning damage, this benefit only applies to the bludgeoning
    damage from this imbued property.

    - **14th** The persistent bludgeoning damage on a hit increases to 1d8.

    - **16th** While suffering from the persistent bludgeoning damage, the
    persistent damage strikes at the creature’s pressure points, slowly sapping
    their ability to deal damage. They take a –1 status penalty to damage rolls
    from Strikes, and each time they fail to remove the persistent damage at the
    end of their turn, the status penalty increases by 1, up to a –4 status
    penalty. Once the persistent damage is removed, the status penalty is also
    removed, and it starts again at –1 the next time you apply the persistent
    bludgeoning damage.

    - **18th** The persistent bludgeoning damage on a hit increases to 1d10.

    - **20th** While suffering from the persistent bludgeoning damage, the
    creature’s body tenses up, preventing their limbs from extending to their
    fullest; their Strikes with a reach of 10 feet or more have their reach
    reduced by 5 feet (or by 10 feet if their reach was 30 feet or more).
