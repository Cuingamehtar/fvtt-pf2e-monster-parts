flavor: >-
  You imbue the weapon with vitriolic venom. All spells and effects that
  normally deal poison damage or persistent poison damage deal acid damage or
  persistent acid damage instead if that would deal more damage.
acid-damage: >-
  All spells and effects that normally deal poison damage or persistent poison
  damage from this imbued property deal acid damage or persistent acid damage
  instead if that would deal more damage.
magic:
  label: Poison (Magic)
  description: >-
    **Type** Weapon


    **Parts** The monster must have the acid or poison trait or an ability or
    spell that deals acid or poison damage.

    - - -

    **Effect** You imbue the weapon with vitriolic venom. All spells and effects
    that normally deal poison damage or persistent poison damage deal acid
    damage or persistent acid damage instead if that would deal more damage.


    **Path** Magic; Choose when you first imbue the weapon for the granted
    spells to be either arcane or primal.

    - **2nd** The weapon can cast
    @UUID[Compendium.pf2e.spells-srd.Item.D7ZEhTNIDWDLC2J4]{Puff of Poison} as a
    cantrip, heightened to half the item's level rounded up.

    - **4th** The weapon can cast
    @UUID[Compendium.pf2e.spells-srd.Item.DYdvMZ8G2LiSLVWw]{Spider Sting} once
    per day.

    - **6th** The weapon can cast 2nd-rank
    @UUID[Compendium.pf2e.spells-srd.Item.1meVElIu1CEVYWkv]{Noxious Vapors} or
    *spider sting* once per day, but not both.

    - **8th** The weapon’s noxious vapors heightens to 3rd rank and it can cast
    @UUID[Compendium.pf2e.spells-srd.Item.3VxVbZqIRvpKkg3O]{Fungal Infestation},
    *noxious vapors*, and *spider sting* each once per day.

    - **10th** Strikes with the weapon deal 1 additional poison damage.

    - **12th** The weapon’s *fungal infestation* and *noxious vapors* heighten
    to 4th rank.

    - **14th** The additional poison damage increases to 1d4.

    - **16th** The weapon’s *fungal infestation* and *noxious vapors* heighten
    to 6th rank, and the weapon can cast 6th-rank
    @UUID[Compendium.pf2e.spells-srd.Item.MlpbeZ61Euhl0d60]{Toxic Cloud} once
    per day.

    - **18th** The additional poison damage increases to 1d6.

    - **20th** The weapon can cast 9th-rank *toxify blood*<sup>ES</sup> once per
    day.
  header:
    level-4-spells: >-
      The weapon can cast
      @UUID[Compendium.pf2e.spells-srd.Item.DYdvMZ8G2LiSLVWw]{Spider Sting} once
      per day.
    level-6-spells: >-
      The weapon can cast 2nd rank
      @UUID[Compendium.pf2e.spells-srd.Item.1meVElIu1CEVYWkv]{Noxious Vapors} or
      @UUID[Compendium.pf2e.spells-srd.Item.DYdvMZ8G2LiSLVWw]{Spider Sting} once
      per day, but not both.
    level-8-spells: >-
      The weapon can cast 3rd rank
      @UUID[Compendium.pf2e.spells-srd.Item.1meVElIu1CEVYWkv]{Noxious Vapors},
      @UUID[Compendium.pf2e.spells-srd.Item.3VxVbZqIRvpKkg3O]{Fungal
      Infestation} and
      @UUID[Compendium.pf2e.spells-srd.Item.DYdvMZ8G2LiSLVWw]{Spider Sting} once
      per day each.
    level-12-spells: >-
      The weapon can cast 4th rank
      @UUID[Compendium.pf2e.spells-srd.Item.1meVElIu1CEVYWkv]{Noxious Vapors},
      4th rank @UUID[Compendium.pf2e.spells-srd.Item.3VxVbZqIRvpKkg3O]{Fungal
      Infestation} and
      @UUID[Compendium.pf2e.spells-srd.Item.DYdvMZ8G2LiSLVWw]{Spider Sting} once
      per day each.
    level-16-spells: >-
      The weapon can cast 6th rank
      @UUID[Compendium.pf2e.spells-srd.Item.1meVElIu1CEVYWkv]{Noxious Vapors},
      6th rank @UUID[Compendium.pf2e.spells-srd.Item.3VxVbZqIRvpKkg3O]{Fungal
      Infestation},
      @UUID[Compendium.pf2e.spells-srd.Item.DYdvMZ8G2LiSLVWw]{Spider Sting} and
      6th rank @UUID[Compendium.pf2e.spells-srd.Item.MlpbeZ61Euhl0d60]{Toxic
      Cloud} once per day each.
    level-20-toxify-blood: he weapon can cast 9th-rank *toxify blood*<sup>ES</sup> once per day.
might:
  label: Poison (Might)
  description: >-
    **Type** Weapon


    **Parts** The monster must have the acid or poison trait or an ability or
    spell that deals acid or poison damage.

    - - -

    **Effect** You imbue the weapon with vitriolic venom. All spells and effects
    that normally deal poison damage or persistent poison damage deal acid
    damage or persistent acid damage instead if that would deal more damage.


    **Path** Might

    - **4th** Strikes with the weapon deal 1 additional poison damage.

    - **6th** The additional poison damage increases to 1d4.

    - **8th** The additional poison damage increases to 1d6. On a critical hit,
    the target takes 1d10 persistent poison damage.

    - **12th** The poison damage dealt by this imbued property ignores
    resistances.

    - **14th** On a critical hit, the persistent poison damage increases to
    2d10.

    - **18th** The additional poison damage increases to 1d8.

    - **20th** On a successful Strike with the weapon, before applying poison
    damage, the target gains weakness 1 to poison until the beginning of your
    next turn.
  effects:
    level-12-resistance: The poison damage dealt by this imbued property ignores resistances.
    level-20-weakness: >-
      On a successful Strike with the weapon, before applying poison damage, the
      target gains weakness 1 to poison until the beginning of your next turn.
      @UUID[Compendium.pf2e-monster-parts.activations-and-effects.Item.ezzdeD7d0ra6b3TX]{Effect:
      Might Path Damage Weakness}
  header:
    level-8-persistent: On a critical hit, the target takes 1d10 persistent poison damage.
    level-12-resistance: The poison damage dealt by this imbued property ignores resistances.
    level-14-persistent: On a critical hit, the target takes 1d10 persistent poison damage.
    level-20-weakness: >-
      On a successful Strike with the weapon, before applying poison damage, the
      target gains weakness 1 to poison until the beginning of your next turn.
tech:
  label: Poison (Technique)
  description: >-
    **Type** Weapon


    **Parts** The monster must have the acid or poison trait or an ability or
    spell that deals acid or poison damage.

    - - -

    **Effect** You imbue the weapon with vitriolic venom. All spells and effects
    that normally deal poison damage or persistent poison damage deal acid
    damage or persistent acid damage instead if that would deal more damage.


    **Path** Technique

    - **4th** Strikes with the weapon deal 1 persistent poison damage.

    - **6th** Strikes with the weapon deal 1 additional poison damage.

    - **8th** The persistent poison damage increases to 1d6. On a critical hit,
    the target takes an additional 1d10 persistent poison damage (As normal, the
    additional persistent poison damage on a critical hit is cumulative with the
    regular persistent poison damage, and you add it only after doubling the
    regular persistent poison damage).

    - **12th** The poison damage dealt by this imbued property (including
    persistent poison damage) ignores resistances.

    - **14th** The persistent poison damage on a hit increases to 1d8.

    - **16th** At the end of a creature’s turn, if it has failed to remove the
    persistent poison damage from this imbued property, choose
    @UUID[Compendium.pf2e.conditionitems.Item.i3OJZU2nk64Df3xm]{Clumsy}
    @UUID[Compendium.pf2e.conditionitems.Item.MIRkyAjyBeXivMa7]{Enfeebled}, or
    @UUID[Compendium.pf2e.conditionitems.Item.e1XGnhKNSQIm5IXg]{Stupefied}. The
    creature gains that condition with a condition value of 1, or increases the
    condition value by 1 if it already had that condition, to a maximum of 3. If
    the creature ever removes the persistent poison damage from this property,
    these conditions immediately end. If you reapply the poison later, you must
    start again from condition values of 0.

    - **18th** The persistent poison damage on a hit increases to 1d10.

    - **20th** On a critical hit, the poison eats away at your foe’s ability to
    resist further poisoning. They are
    @UUID[Compendium.pf2e.conditionitems.Item.4D2KBtexWXa6oUMR]{Drained 1}.
  effects:
    level-12-resistance: >-
      The poison damage dealt by this imbued property (including persistent
