    level-16-condition: >-
      At the end of a creature's turn, if it has failed to remove the persistent
      poison damage from this imbued property, choose
      @UUID[Compendium.pf2e.conditionitems.Item.i3OJZU2nk64Df3xm]{Clumsy},
