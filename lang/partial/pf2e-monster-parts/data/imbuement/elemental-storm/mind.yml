tech:
  label: Mind (Technique)
  description: >-
    **Type** Weapon


    **Parts** The monster must have the astral or mental trait or an attack,
    spell, or ability with the astral or mental traits.

    - - -

    **Effect** You imbue the weapon with psychic power.


    **Path** Technique

    - **4th** Strikes with the weapon deal 1 persistent mental damage.

    - **6th** Strikes with the weapon deal 1 additional mental damage.

    - **8th** On a critical hit, the target is
    @UUID[Compendium.pf2e.conditionitems.Item.e1XGnhKNSQIm5IXg]{Stupefied 1} for
    1 round.

    - **10th** The persistent mental damage increases to 1d6.

    - **12th** The mental damage dealt by this imbued property (including
    persistent mental damage) ignores resistances.

    - **14th** The persistent mental damage on a hit increases to 1d8.

    - **16th** On a critical hit, the target is
    @UUID[Compendium.pf2e.conditionitems.Item.e1XGnhKNSQIm5IXg]{Stupefied 2} for
    1 round.

    - **18th** The persistent mental damage on a hit increases to 1d10.

    - **20th** While the foe has persistent mental damage from the imbued
    property, the stupefied condition from a critical hit lasts until the
    persistent damage ends or for 1 round, whichever is longer.
  effects:
    level-8-stupefied: >-
