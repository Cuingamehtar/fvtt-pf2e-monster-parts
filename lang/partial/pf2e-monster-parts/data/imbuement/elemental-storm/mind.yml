flavor: You imbue the weapon with psychic power.
magic:
  label: Mind (Magic)
  description: >-
    **Type** Weapon


    **Parts** The monster must have the astral or mental trait or an attack,
    spell, or ability with the astral or mental traits.

    - - -

    **Effect** You imbue the weapon with psychic power.


    **Path** Magic; Choose when you first imbue the weapon for the granted
    spells to be either arcane or occult.

    - **2nd** The weapon can cast
    @UUID[Compendium.pf2e.spells-srd.Item.4gBIw4IDrSfFHik4]{Daze} as a cantrip,
    heightened to half the item's level rounded up.

    - **4th** The weapon can cast
    @UUID[Compendium.pf2e.spells-srd.Item.R8bqnYiThB6MYTxD]{Phantom Pain} once
    per day.

    - **6th** The weapon’s *phantom pain* is heightened to 2nd-rank, and the
    weapon can cast either phantom pain or
    @UUID[Compendium.pf2e.spells-srd.Item.Mkbq9xlAUxHUHyR2]{Paranoia} once per
    day, but not both.

    - **8th** The weapon’s *phantom pain* heightens to 3rd rank and it can cast
    both *phantom pain* and *paranoia* once per day.

    - **10th** Strikes with the weapon deal 1 additional mental damage.

    - **12th** The weapon’s phantom pain heightens to 4th rank, and the weapon
    can cast 5th-rank
    @UUID[Compendium.pf2e.spells-srd.Item.Jmxru8zMdYMRuO5n]{Vision of Death}
    once per day.

    - **14th** The additional mental damage increases to 1d4.

    - **16th** The weapon’s *paranoia* and *vision of death* heighten to 6th
    rank, and the weapon can cast
    @UUID[Compendium.pf2e.spells-srd.Item.0XP2XOxT9VSiXFDr]{Phantasmal Calamity}
    once per day, but it can no longer cast *phantom pain*.

    - **18th** The additional force damage increases to 1d6.

    - **20th** The weapon can cast
    @UUID[Compendium.pf2e.spells-srd.Item.MJx7DmjsWYzDZ3a4]{Phantasmagoria} once
    per day. once per day.
  header:
    level-4-spells: >-
      The weapon can cast
      @UUID[Compendium.pf2e.spells-srd.Item.R8bqnYiThB6MYTxD]{Phantom Pain} once
      per day.
    level-6-spells: >-
      The weapon can cast 2nd rank
      @UUID[Compendium.pf2e.spells-srd.Item.R8bqnYiThB6MYTxD]{Phantom Pain} or
      @UUID[Compendium.pf2e.spells-srd.Item.Mkbq9xlAUxHUHyR2]{Paranoia} once per
      day, but not both.
    level-8-spells: >-
      The weapon can cast 3rd rank
      @UUID[Compendium.pf2e.spells-srd.Item.R8bqnYiThB6MYTxD]{Phantom Pain} and
      @UUID[Compendium.pf2e.spells-srd.Item.Mkbq9xlAUxHUHyR2]{Paranoia} once per
      day each.
    level-12-spells: >-
      The weapon can cast 4th rank
      @UUID[Compendium.pf2e.spells-srd.Item.R8bqnYiThB6MYTxD]{Phantom Pain},
      @UUID[Compendium.pf2e.spells-srd.Item.Mkbq9xlAUxHUHyR2]{Paranoia} and 5th
      rank @UUID[Compendium.pf2e.spells-srd.Item.Jmxru8zMdYMRuO5n]{Vision of
      Death} once per day each.
    level-16-spells: >-
      The weapon can cast 6th rank
       @UUID[Compendium.pf2e.spells-srd.Item.Mkbq9xlAUxHUHyR2]{Paranoia}, 6th
      rank @UUID[Compendium.pf2e.spells-srd.Item.Jmxru8zMdYMRuO5n]{Vision of
      Death} and
      @UUID[Compendium.pf2e.spells-srd.Item.0XP2XOxT9VSiXFDr]{Phantasmal
      Calamity} once per day each.
    level-20-phantasmagoria: >-
      The weapon can cast
      @UUID[Compendium.pf2e.spells-srd.Item.MJx7DmjsWYzDZ3a4]{Phantasmagoria}
      once per day.
might:
  label: Mind (Might)
  description: >-
    **Type** Weapon


    **Parts** The monster must have the astral or mental trait or an attack,
    spell, or ability with the astral or mental traits.

    - - -

    **Effect** You imbue the weapon with psychic power.


    **Path** Might

    - **4th** Strikes with the weapon deal 1 additional mental damage.

    - **6th** The additional mental damage increases to 1d4.

    - **8th** The additional mental damage increases to 1d6.

    - **10th** On a critical hit, the target is
    @UUID[Compendium.pf2e.conditionitems.Item.e1XGnhKNSQIm5IXg]{Stupefied 1} for
    1 round.

    - **12th** The mental damage dealt by this imbued property ignores
    resistances.

    - **16th** On a critical hit, the target is
    @UUID[Compendium.pf2e.conditionitems.Item.e1XGnhKNSQIm5IXg]{Stupefied 2} for
    1 round.

    - **18th** The additional mental damage increases to 1d8.

    - **20th** On a successful Strike with the weapon, before applying mental
    damage, the target gains weakness 1 to mental until the beginning of your
    next turn.
  effects:
    level-10-stupefied: >-
      On a critical hit, the target is
