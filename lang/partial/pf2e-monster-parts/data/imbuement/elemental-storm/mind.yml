  header:
    level-10-stupefied: >-
      On a critical hit, the target is
      @UUID[Compendium.pf2e.conditionitems.Item.e1XGnhKNSQIm5IXg]{Stupefied 1}
      for 1 round.
    level-12-resistance: The mental damage dealt by this imbued property ignores resistances.
    level-16-stupefied: >-
      On a critical hit, the target is
      @UUID[Compendium.pf2e.conditionitems.Item.e1XGnhKNSQIm5IXg]{Stupefied 2}
