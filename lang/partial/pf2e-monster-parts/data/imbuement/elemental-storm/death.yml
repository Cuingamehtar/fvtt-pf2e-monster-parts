tech:
  label: Death (Technique)
  description: >-
    **Type** Weapon


    *Parts* The monster must have the psychopomp, undead, or void trait or an
    ability or spell that deals void damage.

    - - -

    *Effect* You imbue the weapon with the void energy of death.

    - - -

    *Path* Technique

    - **4th** Strikes with the weapon deal 1 persistent void damage.

    - **6th** Strikes with the weapon deal 1 additional void damage.

    - **8th** On a critical hit, the target is
    @UUID[Compendium.pf2e.conditionitems.Item.MIRkyAjyBeXivMa7]{Enfeebled 1} for
    1 round.

    - **10th** The persistent void damage on a hit increases to 1d6.

    - **12th** The void damage dealt by this imbued property (including
    persistent void damage) ignores resistances.

    - **14th** The persistent void damage on a hit increases to 1d8.

    - **16th** On a critical hit, the target is
    @UUID[Compendium.pf2e.conditionitems.Item.MIRkyAjyBeXivMa7]{Enfeebled 2} for
    1 round.

    - **184th** The persistent void damage on a hit increases to 1d10.

    - **20th** While the foe has persistent void damage from the imbued
    property, the enfeebled condition from a critical hit lasts until the
    persistent damage ends or for 1 round, whichever is longer.
  effects:
