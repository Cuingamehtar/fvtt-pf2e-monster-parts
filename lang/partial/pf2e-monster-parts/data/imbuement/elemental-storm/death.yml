flavor: You imbue the weapon with the void energy of death.
magic:
  label: Death (Magic)
  description: >-
    **Type** Weapon


    *Parts* The monster must have the psychopomp, undead, or void trait or an
    ability or spell that deals void damage.

    - - -

    *Effect* You imbue the weapon with the void energy of death.

    - - -

    *Path* Magic; Choose when you first imbue the weapon for the granted spells
    to be either divine or primal.

    - **2nd** The weapon can cast
    @UUID[Compendium.pf2e.spells-srd.Item.mAMEt4FFbdqoRnkN]{Void Warp} as a
    cantrip, heightened to half the item’s level rounded up.

    - **4th** The weapon can cast
    @UUID[Compendium.pf2e.spells-srd.Item.wdA52JJnsuQWeyqz]{Harm} once per day.

    - **6th** The weapon’s *harm* is heightened to 2nd rank, and the weapon can
    cast either *harm* or
    @UUID[Compendium.pf2e.spells-srd.Item.XFtO4BBI22Uox2QP]{Sudden Blight} once
    per day, but not both.

    - **8th** The weapon’s *harm* and *sudden blight* each heighten to 3rd rank
    and it can cast both harm and sudden blight once per day.

    - **10th** Strikes with the weapon deal 1 additional void damage.

    - **12th** The weapon’s *harm* and *sudden blight* heighten to 4th rank, and
    the weapon can cast
    @UUID[Compendium.pf2e.spells-srd.Item.07xYlmGX32XtHGEt]{Vampiric Maiden}
    once per day

    - **14th** The additional void damage increases to 1d4.

    - **16th** The weapon’s *harm* and *vampiric maiden* heighten to 6th rank,
    and the weapon can cast 6th-rank *raise the reaper’s scythe*<sup>ES</sup>
    once per day, but it can no longer cast *sudden blight*.

    - **18th** The additional void damage increases to 1d6.

    - **20th** The weapon can cast
    @UUID[Compendium.pf2e.spells-srd.Item.FEsuyf203wTNE2et]{Wails of the Damned}
    once per day.
  header:
    level-4-spells: >-
      The weapon can cast
      @UUID[Compendium.pf2e.spells-srd.Item.wdA52JJnsuQWeyqz]{Harm} once per
      day.
    level-6-spells: >-
      The weapon can cast either 2nd rank
      @UUID[Compendium.pf2e.spells-srd.Item.wdA52JJnsuQWeyqz]{Harm} or
      @UUID[Compendium.pf2e.spells-srd.Item.XFtO4BBI22Uox2QP]{Sudden Blight}
      once per day, but not both.
    level-8-spells: >-
      The weapon can cast 3rd rank
      @UUID[Compendium.pf2e.spells-srd.Item.wdA52JJnsuQWeyqz]{Harm} and 3rd rank
      @UUID[Compendium.pf2e.spells-srd.Item.XFtO4BBI22Uox2QP]{Sudden Blight}
      once per day each.
    level-12-spells: >-
      The weapon can cast 4th rank
      @UUID[Compendium.pf2e.spells-srd.Item.wdA52JJnsuQWeyqz]{Harm}, 4th rank
      @UUID[Compendium.pf2e.spells-srd.Item.XFtO4BBI22Uox2QP]{Sudden Blight} and
      @UUID[Compendium.pf2e.spells-srd.Item.07xYlmGX32XtHGEt]{Vampiric Maiden}
      once per day each.
    level-16-spells: >-
      The weapon can cast 6th rank
      @UUID[Compendium.pf2e.spells-srd.Item.wdA52JJnsuQWeyqz]{Harm}, 6th rank
      @UUID[Compendium.pf2e.spells-srd.Item.07xYlmGX32XtHGEt]{Vampiric Maiden}
      and *raise the reaper's scythe*<sup>ES</sup> once per day each.
    level-20-wails-of-the-damned: >-
      The weapon can cast
      @UUID[Compendium.pf2e.spells-srd.Item.FEsuyf203wTNE2et]{Wails of the
      Damned} once per day.
might:
  label: Death (Might)
  description: >-
    **Type** Weapon


    *Parts* The monster must have the psychopomp, undead, or void trait or an
    ability or spell that deals void damage.

    - - -

    *Effect* You imbue the weapon with the void energy of death.

    - - -

    *Path* Might

    - **4th** Strikes with the weapon deal 1 additional void damage.

    - **6th** The additional void damage increases to 1d4.

    - **8th** The additional void damage increases to 1d6.

    - **10th** On a critical hit, the target is
    @UUID[Compendium.pf2e.conditionitems.Item.MIRkyAjyBeXivMa7]{Enfeebled 1} for
    1 round.

    - **12th** The void damage dealt by this imbued property ignores
    resistances.

    - **16th** On a critical hit, the target is
    @UUID[Compendium.pf2e.conditionitems.Item.MIRkyAjyBeXivMa7]{Enfeebled 2} for
    1 round.

    - **18th** The additional void damage increases to 1d8.

    - **20th** On a successful Strike with the weapon, before applying void
    damage, the target gains weakness 1 to void until the beginning of your next
    turn.
  effects:
    level-10-enfeebled: >-
