label: Burning Barbs
flavor: You imbue your taunts with fierce flames that literally burn your foes.
description: >-
  **Type** Skill Item (Intimidation)


  **Parts** The creature must have the fire trait or have an ability or spell
  with the fire trait or that deals fire damage.

  - - -

  **Effect** You imbue your taunts with fierce flames that literally burn your
  foes.

  - **6th** The item gains the following activation:  

  **Activate—Burning Barbs** <span class="action-glyph">2</span> (auditory,
  concentrate, emotion, fear, fire, linguistic, manipulate, mental)  

  **Frequency** once per day  

  **Effect** You attempt to Demoralize a creature with taunts so fierce they
  literally burn them. On a successful Demoralize, the foe takes persistent fire
  damage equal to the item's level, or double the persistent fire damage on a
  critical success.

  - **10th** You can use the Burning Barbs activation once per hour instead of
  once per day.

  - **12th** Even when you don't use the Burning Barbs activation, you can
  choose to deal persistent fire damage equal to half the item's level on any
  critically successful Demoralize.

  - **14th** The persistent fire damage from Burning Barbs increases to 1-1/2
  times the item's level on a successful Demoralize (21 persistent fire damage
  at level 14) and 3 times the item's level on a critical success.

  - **16th** You can use the Burning Barbs activation once per 10 minutes
  instead of once per hour.

  - **18th** The persistent fire damage you deal on a critically successful
  Demoralize when you don't use the Burning Barbs activation increases from half
  the item's level to the item's full level.

  - **20th** The persistent fire damage from Burning Barbs increases to twice
  the item's level on a successful Demoralize and four times the item's level on
  a critical success.
